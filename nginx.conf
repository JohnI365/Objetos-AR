server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Modelos 3D comprimidos (Draco). MIME type correcto + cache largo.
    # max-age de 7 dias (no "immutable") porque el archivo puede reemplazarse
    # con el mismo nombre durante la preparacion del evento.
    location ~* \.glb$ {
        default_type model/gltf-binary;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
